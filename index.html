const $u=v=>"$"+Math.round(Math.abs(v)).toLocaleString();
const $z=v=>"ZWG\u202f"+Math.round(Math.abs(v)).toLocaleString();
const pc=(a,b)=>b>0?(a/b*100).toFixed(1)+"%":"--";
function pdDates(){
  const all=DATES.filter(d=>d<=sDate);
  if(sPerd==="Day")return all.filter(d=>d===sDate);
  if(sPerd==="STD")return all;
  if(sPerd==="MTD")return all.filter(d=>d.slice(0,7)===sDate.slice(0,7));
  const dt=new Date(sDate+"T00:00Z"),dow=(dt.getDay()+6)%7,mon=new Date(dt);
  mon.setDate(dt.getDate()-dow);return all.filter(d=>d>=mon.toISOString().slice(0,10));
}
function getDays(){const pd=new Set(pdDates()),fl=sFloor==="ALL"?FLOORS:[sFloor];return fl.flatMap(f=>FD[f].days.filter(r=>pd.has(r.d)));}
function getExc(){const pd=new Set(pdDates()),fl=sFloor==="ALL"?FLOORS:[sFloor];return fl.flatMap(f=>FD[f].exc.filter(e=>pd.has(e.d)));}
function flDays(f){const pd=new Set(pdDates());return FD[f].days.filter(r=>pd.has(r.d));}
function flExc(f){const pd=new Set(pdDates());return FD[f].exc.filter(e=>pd.has(e.d));}
function agg(rows){
  const g={tv:0,tz:0,cn:0,dn:0,av:0,tr:0,so:0,sc:0,fi:0,fc:0,fs:0,fv:0,fb:0,wa:0,su:0,sz:0,nr:0,nz:0,nu:0,ap:0,gp:0,wt:0,wn:0};
  for(const r of rows){for(const k of Object.keys(g))if(k in r)g[k]+=r[k];g.wt+=r.tv*r.rt;g.wn+=r.tv;}
  g.rate=g.wn>0?g.wt/g.wn:25.3;g.nzu=g.nz/g.rate;return g;
}
function banner(exc){
  const d=exc.filter(e=>e.t==="debt").length,p=exc.filter(e=>e.t==="prior").length,w=exc.filter(e=>e.t==="wa").length,bad=d+p;
  if(bad>0)return`<div class="banner bbd"><div><div class="bt">&#9888; Payment on hold</div><div class="bs">${bad} exception${bad>1?"s":""} require resolution - ${d} grower shortfall - ${p} prior-period</div></div><span class="btg">${bad} to resolve</span></div>`;
  if(w>0)return`<div class="banner bwn"><div><div class="bt">&#9888; Proceed with note</div><div class="bs">${w} W&amp;A timing - TV on adjacent posting day</div></div><span class="btg">Note required</span></div>`;
  return`<div class="banner bok"><div><div class="bt">&#10003; Clear to pay</div><div class="bs">All sell sheets reconcile for this period</div></div><span class="btg">Approved</span></div>`;
}
function gtag(gap,tv){
  if(gap<=0.5)return'<span class="tag tok">Balanced</span>';
  const p=gap/tv*100;
  return p<3?`<span class="tag twn">${$u(gap)} (${p.toFixed(1)}%)</span>`:`<span class="tag tbd">${$u(gap)} (${p.toFixed(1)}%)</span>`;
}

    <div style="display:flex;gap:10px;margin-bottom:5px;font-size:10px;color:#6b7280">${showF.map(f=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:${COLS[f]}"></span>${f}</span>`).join("")}</div>

    document.getElementById("ct").innerHTML=h;
    if(CH){CH.destroy();CH=null;}
    CH=new Chart(document.getElementById("tv-c"),{type:"bar",

      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},

function render(){
  if(CH){CH.destroy();CH=null;}
  const exc=getExc(),pd=pdDates();
  document.getElementById("pi").innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,.6)">${sPerd==="Day"?"Day":sPerd==="WTD"?"WTD":sPerd==="MTD"?"MTD":"Season"} - ${pd.length===1?pd[0]:pd[0]+" to "+pd[pd.length-1]} - ${sFloor==="ALL"?"All floors":sFloor}</div>`;
  const n=exc.length,cls=exc.some(e=>e.t!=="wa")?"xbr":n?"xbw":"xbg";
  document.getElementById("tabs").innerHTML=TABS.map(t=>{
    const badge=t==="Exceptions"?` <span class="xb ${cls}">${n||"&#10003;"}</span>`:"";
    return`<div class="tab${sTab===t?" on":""}" data-tab="${t}">${t}${badge}</div>`;
  }).join("");
  document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",()=>{sTab=el.dataset.tab;render();}));
  if(sTab==="Overview")renderOV();
  else if(sTab==="Reconciliation")renderRC();
  else if(sTab==="Floor Income")renderFI();
  else if(sTab==="Statutory")renderST();
  else if(sTab==="Stop Orders")renderSO();
  else if(sTab==="Net Payment")renderNT();
  else renderEX();
}
